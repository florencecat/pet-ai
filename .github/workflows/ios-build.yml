name: iOS Build
on:
  push:
    branches: [main]
  workflow_dispatch:
jobs:
  build-ios:
    runs-on: macos-latest
    defaults:
      run:
        working-directory: ./pet_ai
    steps:
      - uses: actions/checkout@v4

      - uses: subosito/flutter-action@v2
        with:
          flutter-version: '3.41.4'
          channel: 'stable'
          cache: true

      - name: Install dependencies
        run: flutter pub get

      - name: Configure iOS project (generates Podfile + pod install)
        run: flutter build ios --release --no-codesign --config-only

      - name: Disable code signing for all Pod targets
        working-directory: ./pet_ai/ios
        run: |
          ruby -e '
            content = File.read("Podfile")
            content.sub!(
              "flutter_additional_ios_build_settings(target)",
              "flutter_additional_ios_build_settings(target)\n    target.build_configurations.each do |config|\n      config.build_settings[\"CODE_SIGNING_ALLOWED\"] = \"NO\"\n      config.build_settings[\"CODE_SIGNING_REQUIRED\"] = \"NO\"\n      config.build_settings[\"CODE_SIGN_IDENTITY\"] = \"\"\n    end"
            )
            File.write("Podfile", content)
          '
          cat Podfile
          pod install

      - name: Build IPA (no codesign)
        run: |
          flutter build ios --release --no-codesign
          cd build/ios/iphoneos
          mkdir Payload
          cp -r Runner.app Payload/
          zip -r app.ipa Payload

      - name: Upload IPA
        uses: actions/upload-artifact@v4
        with:
          name: ios-ipa
          path: pet_ai/build/ios/iphoneos/app.ipa
          retention-days: 7
