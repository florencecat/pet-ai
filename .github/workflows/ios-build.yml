name: iOS Build
on:
  push:
    branches: [main]
  workflow_dispatch:
jobs:
  build-ios:
    runs-on: macos-latest
    defaults:
      run:
        working-directory: ./pet_ai
    steps:
      - uses: actions/checkout@v4
      - uses: subosito/flutter-action@v2
        with:
          flutter-version: '3.41.4'
          channel: 'stable'
          cache: true
      - name: Debug structure
        run: |
          echo "=== PWD ==="
          pwd
          echo "=== ROOT ==="
          ls $GITHUB_WORKSPACE
          echo "=== pet_ai ==="
          ls $GITHUB_WORKSPACE/pet_ai
      - name: Install dependencies
        run: flutter pub get
      - name: Build IPA (no codesign)
        run: |
          flutter build ios --release --no-codesign
          cd build/ios/iphoneos
          mkdir Payload
          cp -r Runner.app Payload/
          zip -r app.ipa Payload
      - name: Upload IPA
        uses: actions/upload-artifact@v4
        with:
          name: ios-ipa
          path: pet_ai/build/ios/iphoneos/app.ipa
          retention-days: 7
